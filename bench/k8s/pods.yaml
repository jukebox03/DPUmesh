# pods.yaml — k8s manifest for the DPUmesh benchmark environment.
#
# Applied by bench/bench.sh (`bench.sh deploy`) via:
#     envsubst < bench/k8s/pods.yaml | kubectl apply -n <ns> -f -
# All Deployments start at replicas: 0; bench.sh scales them up (innermost first).
#
# Substituted variables (bench.sh exports these, with defaults, before envsubst):
#   IMG_*                 container image tags
#   CTRL_PORT TCP_PORT    control (9092) / TCP-baseline (9091) ports
#   HOST_PCI              host PCIe address of the DPU
#   LIB_OUT               host path holding libdpumesh.so (bind-mounted into pods)
#   DPUMESH_RINGS_PER_POD ASYNC_THREADS BENCH_PIPELINE BENCH_COALESCE
#   ECHO_THREADS DPUMESH_ARENA_SLOTS DMESH_PRELOAD_DEBUG
#
# bench-dpumesh (client, pod 10) --DPUmesh--> echo-dpumesh (greeter, pod 11).
# bench-tcp/echo-tcp: the TCP+Envoy sidecar baseline. loopback/stream/preload:
# feature validators (see ../validators/README.md).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bench-dpumesh
spec:
  replicas: 0
  selector: { matchLabels: { app: bench-dpumesh } }
  template:
    metadata: { labels: { app: bench-dpumesh } }
    spec:
      hostname: bench-dpumesh
      containers:
      - name: bench-dpumesh
        image: docker.io/${IMG_BENCH_DPU}
        imagePullPolicy: Never
        ports: [{ containerPort: ${CTRL_PORT} }]
        env:
        - { name: DPUMESH_PCI_ADDR, value: "${HOST_PCI}" }
        - { name: DPUMESH_RINGS_PER_POD, value: "${DPUMESH_RINGS_PER_POD}" }
        - { name: BENCH_WORKER_ID, value: "10" }
        - { name: BENCH_DST_POD_ID, value: "11" }
        - { name: ASYNC_THREADS, value: "${ASYNC_THREADS}" }
        - { name: BENCH_PIPELINE, value: "${BENCH_PIPELINE}" }
        - { name: BENCH_COALESCE, value: "${BENCH_COALESCE}" }
        securityContext: { privileged: true }
        volumeMounts:
        - { mountPath: /dev/infiniband, name: infiniband }
        - { mountPath: /usr/local/lib/libdpumesh.so, name: libdpumesh-so, subPath: libdpumesh.so }
      volumes:
      - { name: infiniband, hostPath: { path: /dev/infiniband } }
      - { name: libdpumesh-so, hostPath: { path: ${LIB_OUT}, type: Directory } }
---
apiVersion: v1
kind: Service
metadata: { name: bench-dpumesh }
spec:
  selector: { app: bench-dpumesh }
  ports: [{ port: ${CTRL_PORT}, targetPort: ${CTRL_PORT} }]
---
