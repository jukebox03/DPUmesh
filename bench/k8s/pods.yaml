apiVersion: v1
kind: Service
metadata: { name: preload-sock }
spec:
  clusterIP: 10.96.0.18
  selector: { app: preload-echo }
  ports: [{ port: 9100, targetPort: 9100 }]
---
# bench-tcp: TCP baseline client + sidecar1 (Envoy) in ONE pod sharing 1 host core
# (the realistic sidecar tax). bench connects to localhost:$TCP_PORT (sidecar1),
# which forwards to the echo-tcp Service (-> sidecar2). Pinned post-deploy.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bench-tcp
spec:
  replicas: 0
  selector: { matchLabels: { app: bench-tcp } }
  template:
    metadata: { labels: { app: bench-tcp } }
    spec:
      containers:
      - name: bench-tcp
        image: docker.io/${IMG_BENCH_TCP}
        imagePullPolicy: Never
        ports: [{ containerPort: ${CTRL_PORT} }]
        env:
        - { name: BENCH_TARGET, value: "127.0.0.1:${TCP_PORT}" }
      - name: sidecar1
        image: docker.io/${IMG_ENVOY}
        imagePullPolicy: IfNotPresent
        args: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "warn"]
        ports: [{ containerPort: ${TCP_PORT} }]
        volumeMounts:
        - { mountPath: /etc/envoy, name: sidecar1-config, readOnly: true }
      volumes:
      - { name: sidecar1-config, configMap: { name: sidecar1-config } }
---
apiVersion: v1
kind: Service
metadata: { name: bench-tcp }
spec:
  selector: { app: bench-tcp }
  ports: [{ port: ${CTRL_PORT}, targetPort: ${CTRL_PORT} }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-tcp
spec:
  replicas: 0
  selector: { matchLabels: { app: echo-tcp } }
  template:
    metadata: { labels: { app: echo-tcp } }
    spec:
      # echo app (matched C echo_sock) + sidecar2 in same pod sharing 1 host core.
      # echo_sock listens on ECHO_PORT=9092; sidecar2 listens on ${TCP_PORT} and
      # forwards to 127.0.0.1:9092.
      containers:
      - name: echo-tcp
        image: docker.io/${IMG_ECHO_TCP}
        imagePullPolicy: Never
        env:
        - { name: ECHO_PORT, value: "9092" }
        ports: [{ containerPort: 9092 }]
      - name: sidecar2
        image: docker.io/${IMG_ENVOY}
        imagePullPolicy: IfNotPresent
        args: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "warn"]
        ports: [{ containerPort: ${TCP_PORT} }]
        volumeMounts:
        - { mountPath: /etc/envoy, name: sidecar2-config, readOnly: true }
      volumes:
      - { name: sidecar2-config, configMap: { name: sidecar2-config } }
---
apiVersion: v1
kind: Service
metadata: { name: echo-tcp }
spec:
  selector: { app: echo-tcp }
  ports: [{ port: ${TCP_PORT}, targetPort: ${TCP_PORT} }]
---
# echo-direct Service: routes straight to echo-tcp's echo_sock (port 9092), bypassing BOTH
# Envoy sidecars — the direct-kernel-TCP ablation. It reuses the echo-tcp pod's server, so the
# server core (echo_sock, core 3) is identical to the tcp-envoy path; only the client path (no
# sidecars) differs, isolating exactly the sidecar tax.
apiVersion: v1
kind: Service
metadata: { name: echo-direct }
spec:
  selector: { app: echo-tcp }
  ports: [{ port: 9092, targetPort: 9092 }]
---
# bench-direct: matched-C client (bench_sock) pointed straight at echo_sock (no sidecar).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bench-direct
spec:
  replicas: 0
  selector: { matchLabels: { app: bench-direct } }
  template:
    metadata: { labels: { app: bench-direct } }
    spec:
      containers:
      - name: bench-direct
        image: docker.io/${IMG_BENCH_TCP}
        imagePullPolicy: Never
        ports: [{ containerPort: ${CTRL_PORT} }]
        env:
        - { name: BENCH_TARGET, value: "echo-direct:9092" }
---
apiVersion: v1
kind: Service
metadata: { name: bench-direct }
spec:
  selector: { app: bench-direct }
  ports: [{ port: ${CTRL_PORT}, targetPort: ${CTRL_PORT} }]
---
# sidecar1 ConfigMap (bench-tcp pod): tcp_proxy filter only — minimum viable Envoy
# doing pure TCP forwarding, forwarding to the echo-tcp Service (-> sidecar2).
apiVersion: v1
kind: ConfigMap
metadata: { name: sidecar1-config }
data:
  envoy.yaml: |
    static_resources:
      listeners:
      - name: tcp_listener
        address:
          socket_address: { address: 0.0.0.0, port_value: ${TCP_PORT} }
        filter_chains:
        - filters:
          - name: envoy.filters.network.tcp_proxy
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
              stat_prefix: tcp
              cluster: upstream
      clusters:
      - name: upstream
        type: STRICT_DNS
        connect_timeout: 5s
        load_assignment:
          cluster_name: upstream
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address: { address: echo-tcp, port_value: ${TCP_PORT} }
---
# sidecar2 ConfigMap (echo-tcp pod): forwards to the echo container in the SAME
# pod via 127.0.0.1:9092.
apiVersion: v1
kind: ConfigMap
metadata: { name: sidecar2-config }
data:
  envoy.yaml: |
    static_resources:
      listeners:
      - name: tcp_listener
        address:
          socket_address: { address: 0.0.0.0, port_value: ${TCP_PORT} }
        filter_chains:
        - filters:
          - name: envoy.filters.network.tcp_proxy
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
              stat_prefix: tcp
              cluster: upstream
      clusters:
      - name: upstream
        connect_timeout: 5s
        load_assignment:
          cluster_name: upstream
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address: { address: 127.0.0.1, port_value: 9092 }
