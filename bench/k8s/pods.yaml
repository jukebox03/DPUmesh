# stream-dpumesh (pod_id=16): byte-stream / L7-proxy frame validator. The 'stream'
# RUN needs the DPU launched with DPUMESH_PROXY=frame, but the pod registers like
# any other regardless of proxy mode, so start_pods brings it up with everything
# else (it no longer self-starts on demand — no pod start against a running DPU).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-dpumesh
spec:
  replicas: 0
  selector: { matchLabels: { app: stream-dpumesh } }
  template:
    metadata: { labels: { app: stream-dpumesh } }
    spec:
      hostname: stream-dpumesh
      containers:
      - name: stream-dpumesh
        image: docker.io/${IMG_STREAM_DPU}
        imagePullPolicy: Never
        ports: [{ containerPort: ${CTRL_PORT} }]
        env:
        - { name: DPUMESH_PCI_ADDR, value: "${HOST_PCI}" }
        - { name: DPUMESH_RINGS_PER_POD, value: "${DPUMESH_RINGS_PER_POD}" }
        - { name: BENCH_WORKER_ID, value: "16" }
        securityContext: { privileged: true }
        volumeMounts:
        - { mountPath: /dev/infiniband, name: infiniband }
        - { mountPath: /usr/local/lib/libdpumesh.so, name: libdpumesh-so, subPath: libdpumesh.so }
      volumes:
      - { name: infiniband, hostPath: { path: /dev/infiniband } }
      - { name: libdpumesh-so, hostPath: { path: ${LIB_OUT}, type: Directory } }
---
apiVersion: v1
kind: Service
metadata: { name: stream-dpumesh }
spec:
  selector: { app: stream-dpumesh }
