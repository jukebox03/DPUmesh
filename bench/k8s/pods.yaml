# Benchmark deployments for DPUmesh, TCP/Envoy, and feature validators.
# bench.sh substitutes image, port, PCI, library, and runtime variables before
# applying the manifest. Deployments start with zero replicas.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bench-dpumesh
spec:
  replicas: 0
  selector: { matchLabels: { app: bench-dpumesh } }
  template:
    metadata: { labels: { app: bench-dpumesh } }
    spec:
      hostname: bench-dpumesh
      containers:
      - name: bench-dpumesh
        image: docker.io/${IMG_BENCH_DPU}
        imagePullPolicy: Never
        ports: [{ containerPort: ${CTRL_PORT} }]
        env:
        - { name: DPUMESH_PCI_ADDR, value: "${HOST_PCI}" }
        - { name: DPUMESH_RINGS_PER_POD, value: "${DPUMESH_RINGS_PER_POD}" }
        - { name: BENCH_DST_SERVICE, value: "echo-dpumesh" }   # peer by k8s Service NAME (pure client)
        - { name: ASYNC_THREADS, value: "${ASYNC_THREADS}" }
        - { name: BENCH_PIPELINE, value: "${BENCH_PIPELINE}" }
        - { name: BENCH_COALESCE, value: "${BENCH_COALESCE}" }
        securityContext: { privileged: true }
        volumeMounts:
        - { mountPath: /dev/infiniband, name: infiniband }
        - { mountPath: /usr/local/lib/libdpumesh.so.2, name: libdpumesh-so, subPath: libdpumesh.so.2 }
      volumes:
      - { name: infiniband, hostPath: { path: /dev/infiniband } }
      - { name: libdpumesh-so, hostPath: { path: ${LIB_OUT}, type: Directory } }
---
apiVersion: v1
kind: Service
metadata: { name: bench-dpumesh }
spec:
  selector: { app: bench-dpumesh }
  ports: [{ port: ${CTRL_PORT}, targetPort: ${CTRL_PORT} }]
---
